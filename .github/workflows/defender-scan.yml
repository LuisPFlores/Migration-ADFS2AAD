# Microsoft Defender for Cloud - Security Scan
# Scans code and dependencies for vulnerabilities on every push to main
#
# Setup:
#   1. Connect GitHub org to Defender for Cloud:
#      Azure Portal > Defender for Cloud > Environment Settings > Add Environment > GitHub

name: Microsoft Defender for Cloud Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  security-events: write

jobs:
  defender-scan:
    name: Defender for Cloud Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Microsoft Security DevOps
        uses: microsoft/security-devops-action@v1
        id: msdo

      - name: Upload results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always() && steps.msdo.outputs.sarifFile != ''
        with:
          sarif_file: ${{ steps.msdo.outputs.sarifFile }}

      - name: Upload scan artifacts
        uses: actions/upload-artifact@v4
        if: always() && steps.msdo.outputs.sarifFile != ''
        with:
          name: defender-scan-results
          path: ${{ steps.msdo.outputs.sarifFile }}
          retention-days: 30
